  .page { max-width: 1180px; margin: 0 auto; position: relative; z-index: 1; }

  header.top { margin-bottom: 22px; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
    letter-spacing: .12em; text-transform: uppercase; color: var(--accent-2);
    background: var(--accent-soft); border: 1px solid rgba(91,141,239,.25);
    border-radius: 999px; padding: 5px 12px; margin-bottom: 12px;
  }
  .eyebrow .pulse {
    width: 7px; height: 7px; border-radius: 50%; background: var(--accent-2);
    box-shadow: 0 0 0 0 rgba(122,162,255,.6); animation: pulse 2.4s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(122,162,255,.45); }
    70%  { box-shadow: 0 0 0 8px rgba(122,162,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(122,162,255,0); }
  }
  h1 {
    font-size: 28px; margin: 0 0 8px; font-weight: 800; letter-spacing: -.02em;
    background: linear-gradient(135deg, #ffffff 0%, #aebfe8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--muted); font-size: 14px; margin: 0 0 20px; max-width: 760px; line-height: 1.6; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  /* --- Пошук --- */
  .search-wrap { position: relative; max-width: 640px; margin-bottom: 12px; }
  #search {
    width: 100%; padding: 16px 18px 16px 48px; font-size: 15px; border-radius: var(--radius-md);
    border: 1px solid var(--border); background: var(--surface); color: var(--text);
    box-shadow: 0 1px 0 rgba(255,255,255,.02) inset, 0 8px 24px rgba(0,0,0,.25);
    outline: none; transition: border-color .2s ease, box-shadow .2s ease; font-family: inherit;
  }
  #search:focus {
    border-color: var(--accent); box-shadow: 0 0 0 4px var(--ring), 0 8px 24px rgba(0,0,0,.3);
  }
  #search::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute; left: 17px; top: 50%; transform: translateY(-50%);
    pointer-events: none; color: var(--muted); display: flex;
  }
  #search:focus ~ .search-icon { color: var(--accent-2); }
  #stats { color: var(--muted); font-size: 13px; margin: 0 0 18px; }

  /* --- Заголовки колонок --- */
  .col-header {
    display: grid; grid-template-columns: 1.6fr 1.4fr 1.1fr 110px;
    gap: 10px; padding: 0 18px 10px; color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: .08em; font-weight: 700;
  }

  /* --- Бренд-акордеон --- */
  .brand-group {
    margin-bottom: 10px; border: 1px solid var(--border); border-radius: var(--radius-lg);
    overflow: hidden; background: linear-gradient(180deg, var(--surface) 0%, rgba(18,26,43,.6) 100%);
    transition: border-color .2s ease, box-shadow .2s ease;
  }
  .brand-group.open { border-color: rgba(91,141,239,.35); box-shadow: 0 0 0 1px rgba(91,141,239,.08), 0 12px 28px rgba(0,0,0,.28); }
  .brand-header {
    display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer;
    user-select: none; font-weight: 700; font-size: 15px;
    transition: background .15s ease;
  }
  .brand-header:hover { background: var(--surface-2); }
  .brand-header .chevron-wrap {
    color: var(--accent-2); transition: transform .2s ease; display: inline-flex; flex-shrink: 0;
    width: 26px; height: 26px; align-items: center; justify-content: center;
    background: var(--accent-soft); border-radius: var(--radius-sm);
  }
  .brand-group.open .brand-header .chevron-wrap { transform: rotate(90deg); }
  .brand-header .count {
    color: var(--muted); font-weight: 600; font-size: 12px; font-family: 'Roboto Mono', monospace;
    background: var(--surface-3); border: 1px solid var(--border); border-radius: 999px;
    padding: 3px 10px; margin-left: 2px;
  }

  /* плавне розгортання акордеону брендів */
  .brand-body-wrap {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .28s ease;
  }
  .brand-group.open .brand-body-wrap { grid-template-rows: 1fr; }
  .brand-body { overflow: hidden; min-height: 0; border-top: 1px solid var(--border); }
  .brand-group:not(.open) .brand-body { border-top-color: transparent; }

  /* --- Рядок моделі --- */
  .model-row { border-top: 1px solid var(--border); }
  .model-row:first-child { border-top: none; }
  .model-row-main {
    display: grid; grid-template-columns: 1.6fr 1.4fr 1.1fr 110px;
    gap: 10px; padding: 14px 18px; align-items: center; font-size: 13.5px; cursor: pointer;
    transition: background .15s ease;
  }
  .model-row-main:hover { background: var(--surface-2); }
  .model { font-family: 'Roboto Mono', ui-monospace, monospace; color: var(--accent-2); font-weight: 600; letter-spacing: .01em; font-size: 13px; }
  .category, .country { color: var(--text-2); }
  .country.empty { color: var(--muted); font-style: italic; }

  .desc-toggle {
    justify-self: end; display: inline-flex; align-items: center; gap: 6px;
    font-size: 12.5px; padding: 6px 13px; border-radius: 999px; font-weight: 600;
    border: 1px solid var(--border); color: var(--accent-2); white-space: nowrap; background: transparent;
    transition: background .15s ease, border-color .15s ease, color .15s ease;
  }
  .desc-toggle .chevron { transition: transform .2s ease; display: inline-flex; }
  .model-row.open .desc-toggle .chevron { transform: rotate(90deg); }
  .desc-toggle.empty { color: var(--muted); border-color: var(--border); cursor: default; }
  .model-row.open .desc-toggle:not(.empty) { background: var(--accent); color: #06121f; border-color: var(--accent); }

  /* плавне розгортання опису */
  .model-desc-wrap {
    display: grid; grid-template-rows: 0fr;
    transition: grid-template-rows .25s ease;
  }
  .model-row.open .model-desc-wrap { grid-template-rows: 1fr; }
  .model-desc { overflow: hidden; min-height: 0; }
  .model-desc-inner { padding: 0 18px 18px; }

  .desc-panel {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-md); padding: 18px 20px; font-size: 13.5px; line-height: 1.6; color: var(--text);
  }
  .desc-panel.empty { color: var(--muted); font-style: italic; }

  /* --- Картка товару: характеристики (як на сторінці товару) --- */
  .spec-section + .spec-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
  .spec-section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
    color: var(--accent-2); margin: 0 0 10px;
  }

  .spec-list { display: flex; flex-direction: column; }
  .spec-row {
    display: flex; align-items: baseline; gap: 8px; padding: 7px 0;
  }
  .spec-row + .spec-row { border-top: 1px dashed var(--border); }
  .spec-row.long { flex-direction: column; align-items: stretch; gap: 4px; }
  .spec-label { color: var(--muted); flex-shrink: 0; }
  .spec-dots {
    flex: 1 1 auto; border-bottom: 1px dotted var(--border); margin-bottom: 5px; min-width: 16px;
  }
  .spec-row.long .spec-dots { display: none; }
  .spec-value { color: var(--text); font-weight: 600; text-align: right; }
  .spec-row.long .spec-value { text-align: left; font-weight: 400; color: var(--text-2); }

  .feature-list { list-style: none; margin: 0; padding: 0; columns: 2; column-gap: 28px; }
  .feature-list li {
    position: relative; padding: 6px 0 6px 18px; break-inside: avoid; color: var(--text-2);
  }
  .feature-list li::before {
    content: ''; position: absolute; left: 0; top: 14px; width: 6px; height: 6px;
    border-radius: 50%; background: var(--accent); flex-shrink: 0;
  }

  mark { background: rgba(91,141,239,.35); color: inherit; border-radius: 3px; }

  .hidden { display: none !important; }

  @media (max-width: 720px) {
    body { padding: 16px; }
    .col-header { display: none; }
    .model-row-main { grid-template-columns: 1fr; gap: 6px; }
    .desc-toggle { justify-self: start; margin-top: 4px; }
    .spec-row { flex-wrap: wrap; }
    .spec-dots { display: none; }
    .spec-value { text-align: left; flex-basis: 100%; }
    .feature-list { columns: 1; }
  }
</style>
</head>
<body>
<div class="page">
<header class="top">
  <div class="eyebrow"><span class="pulse"></span>Довідник моделей</div>
  <h1>База моделей: бренд, категорія, країна збірки, опис</h1>
  <p class="sub">
    Пошук шукає одночасно по бренду, моделі (ігнорує пробіли і регістр), категорії,
    країні збірки і тексту опису — наприклад, можна знайти модель за словом з опису
    (функцією, технологією тощо).
  </p>
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Пошук: модель, бренд, категорія, країна, опис...">
    <span class="search-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </span>
  </div>
  <div id="stats"></div>
</header>
<div class="col-header">
  <div>Модель</div><div>Категорія</div><div>Країна збірки</div><div></div>
</div>
<div id="brands"></div>
</div>
<script>
let descriptions = null;
let descriptionsLoading = false;
let descriptionsCallbacks = [];

function loadDescriptions(cb) {
  if (descriptions) { cb(descriptions); return; }
  descriptionsCallbacks.push(cb);
  if (descriptionsLoading) return;
  descriptionsLoading = true;
  fetch('descriptions.json').then(r => r.json()).then(d => {
    descriptions = d;
    descriptionsCallbacks.splice(0).forEach(fn => fn(descriptions));
  }).catch(() => {
    descriptionsCallbacks.splice(0).forEach(fn => fn(null));
  });
}

const brandsEl = document.getElementById('brands');
const statsEl = document.getElementById('stats');

const CHEVRON_SVG = '<svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

function normalize(s) {
  return (s || '').replace(/\s+/g, '').toUpperCase();
}

function el(tag, opts) {
  const e = document.createElement(tag);
  if (opts) {
    if (opts.text !== undefined) e.textContent = opts.text;
    if (opts.html !== undefined) e.innerHTML = opts.html;
    if (opts.className) e.className = opts.className;
  }
  return e;
}

// Розбиває текст опису на токени по "кома+пробіл", але не розбиває всередині дужок
// (наприклад "AbsoluteCare (softwater, salt)" лишається одним токеном) і не чіпає
// "склеєні" коми без пробілу (наприклад "ON/OFF,Temp,Spin" — це список значень
// одного параметра, він лишається одним токеном).
function splitDescription(desc) {
  const parts = [];
  let depth = 0;
  let current = '';
  for (let i = 0; i < desc.length; i++) {
    const ch = desc[i];
    if (ch === '(') depth++;
    if (ch === ')') depth = Math.max(0, depth - 1);
    if (ch === ',' && depth === 0 && desc[i + 1] === ' ') {
      parts.push(current.trim());
      current = '';
      i++; // пропускаємо пробіл після коми
      continue;
    }
    current += ch;
  }
  if (current.trim()) parts.push(current.trim());
  return parts.filter(Boolean);
}

// Розбиває текст опису на "характеристики ключ:значення" і "додаткові можливості".
// Працює універсально для будь-якого джерела (УКТ ЗЕД, ELX, ТВ, LG, майбутні),
// бо орієнтується лише на формат самого тексту опису.
function parseDescription(desc) {
  const parts = splitDescription(desc);
  const specs = [];
  const features = [];
  for (const p of parts) {
    const m = p.match(/^([^:]{1,40}):\s*(.*)$/);
    if (m) {
      const key = m[1].trim();
      const value = m[2].trim();
      if (!value) continue; // порожні характеристики (напр. "Код УКТЗЕД: ") пропускаємо
      // Список значень "a,b,c" без пробілів робимо читабельним: "a, b, c"
      specs.push([key, value.includes(',') ? value.split(',').map(v => v.trim()).join(', ') : value]);
    } else {
      features.push(p);
    }
  }
  return {specs, features};
}

function buildDescPanel(description) {
  const panel = el('div', {className: 'desc-panel'});
  if (!description) {
    panel.classList.add('empty');
    panel.textContent = 'Опис відсутній.';
    return panel;
  }

  const {specs, features} = parseDescription(description);

  if (specs.length) {
    const section = el('div', {className: 'spec-section'});
    section.appendChild(el('div', {className: 'spec-section-title', text: 'Характеристики'}));
    const list = el('div', {className: 'spec-list'});
    specs.forEach(([k, v]) => {
      const isLong = v.length > 40;
      const row = el('div', {className: isLong ? 'spec-row long' : 'spec-row'});
      row.appendChild(el('span', {className: 'spec-label', text: k}));
      row.appendChild(el('span', {className: 'spec-dots'}));
      row.appendChild(el('span', {className: 'spec-value', text: v}));
      list.appendChild(row);
    });
    section.appendChild(list);
    panel.appendChild(section);
  }

  if (features.length) {
    const section = el('div', {className: 'spec-section'});
    section.appendChild(el('div', {className: 'spec-section-title', text: 'Додаткові можливості'}));
    const list = el('ul', {className: 'feature-list'});
    features.forEach(f => {
      list.appendChild(el('li', {text: f}));
    });
    section.appendChild(list);
    panel.appendChild(section);
  }

  if (!specs.length && !features.length) {
    panel.classList.add('empty');
    panel.textContent = 'Опис відсутній.';
  }

  return panel;
}

function renderAll(DATA) {
  document.getElementById('brands').innerHTML = '';
  const groups = new Map();
DATA.forEach(r => {
  const key = r.brand || '—';
  if (!groups.has(key)) groups.set(key, []);
  groups.get(key).push(r);
});
const brandNames = [...groups.keys()].sort((a, b) => a.localeCompare(b, 'uk'));

brandNames.forEach(brand => {
  const records = groups.get(brand);

  const group = el('div', {className: 'brand-group'});
  group.dataset.open = 'false';

  const header = el('div', {className: 'brand-header'});
  header.appendChild(el('span', {className: 'chevron-wrap', html: CHEVRON_SVG}));
  header.appendChild(el('span', {text: brand}));
  header.appendChild(el('span', {className: 'count', text: `${records.length}`}));
  header.onclick = () => {
    const isOpen = group.dataset.open === 'true';
    group.dataset.open = isOpen ? 'false' : 'true';
    group.classList.toggle('open', !isOpen);
  };
  group.appendChild(header);

  const bodyWrap = el('div', {className: 'brand-body-wrap'});
  const body = el('div', {className: 'brand-body'});

  records.forEach(r => {
    const row = el('div', {className: 'model-row'});
    row.dataset.search = (r.brand + ' ' + r.model + ' ' + r.category + ' ' + r.country_assembly).toLowerCase();
    row.dataset.modelNorm = normalize(r.model);
    row.dataset.brand = r.brand;

    const main = el('div', {className: 'model-row-main'});
    main.appendChild(el('div', {className: 'model', text: r.model}));
    main.appendChild(el('div', {className: 'category', text: r.category || '—'}));
    main.appendChild(el('div', {className: 'country' + (r.country_assembly ? '' : ' empty'), text: r.country_assembly || '—'}));

    const hasDesc = true; // lazy: always expandable
    const toggle = el('div', {className: 'desc-toggle' + (hasDesc ? '' : ' empty')});
    if (hasDesc) {
      toggle.appendChild(document.createTextNode('Опис '));
      toggle.appendChild(el('span', {html: CHEVRON_SVG}));
    } else {
      toggle.textContent = 'Опис відсутній';
    }
    main.appendChild(toggle);
    row.appendChild(main);

    const descWrap = el('div', {className: 'model-desc-wrap'});
    const descOuter = el('div', {className: 'model-desc'});
    const descInner = el('div', {className: 'model-desc-inner'});
    const _placeholderPanel = buildDescPanel(""); _placeholderPanel.dataset.lazy = "1"; descInner.appendChild(_placeholderPanel);
    descOuter.appendChild(descInner);
    descWrap.appendChild(descOuter);
    row.appendChild(descWrap);

    if (hasDesc) {
      main.onclick = () => {
        row.classList.toggle('open');
      };
    }

    body.appendChild(row);
  });

  bodyWrap.appendChild(body);
  group.appendChild(bodyWrap);
  brandsEl.appendChild(group);
});

const TOTAL = DATA.length;
statsEl.textContent = `Всього: ${TOTAL} моделей, ${brandNames.length} брендів.`;
}

document.getElementById('search').addEventListener('input', (e) => {
  const raw = e.target.value.trim();
  const qText = raw.toLowerCase();
  const qModel = normalize(raw);

  if (!raw) {
    document.querySelectorAll('.brand-group').forEach(group => {
      group.classList.toggle('open', group.dataset.open === 'true');
      group.classList.remove('hidden');
      group.querySelectorAll('.model-row').forEach(row => {
        row.classList.remove('hidden');
      });
    });
    statsEl.textContent = `Всього: ${TOTAL} моделей, ${brandNames.length} брендів.`;
    return;
  }

  let visible = 0, visibleBrands = 0;
  document.querySelectorAll('.brand-group').forEach(group => {
    let groupHas = false;
    group.querySelectorAll('.model-row').forEach(row => {
      const match = row.dataset.search.includes(qText) || (qModel && row.dataset.modelNorm.includes(qModel));
      row.classList.toggle('hidden', !match);
      if (match) { visible++; groupHas = true; }
    });
    group.classList.toggle('open', groupHas);
    group.classList.toggle('hidden', !groupHas);
    if (groupHas) visibleBrands++;
  });
  statsEl.textContent = `Знайдено: ${visible} з ${TOTAL} (${visibleBrands} брендів)`;
});

fetch('index_data.json').then(r => r.json()).then(indexData => {
  const DATA = indexData.map(r => ({
    brand: r.b,
    model: r.m,
    model_normalized: r.mn,
    category: r.c || '',
    country_assembly: r.ca || '',
    description: ''
  }));
  renderAll(DATA);

  // Patch: on first open, replace placeholder panel with real description
  document.querySelectorAll('.model-row').forEach(row => {
    const mainEl = row.querySelector('.model-row-main');
    if (!mainEl) return;
    const prevOnClick = mainEl.onclick;
    mainEl.onclick = function() {
      if (prevOnClick) prevOnClick.call(this);
      const brand = row.dataset.brand;
      const mn = row.dataset.modelNorm;
      const placeholder = row.querySelector('[data-lazy="1"]');
      if (!placeholder) return;
      placeholder.removeAttribute('data-lazy');
      placeholder.textContent = 'Завантаження...';
      placeholder.classList.add('empty');
      loadDescriptions(descs => {
        const key = brand + '|' + mn;
        const desc = descs ? (descs[key] || '') : '';
        const built = buildDescPanel(desc);
        placeholder.replaceWith(built);
      });
    };
  });
}).catch(err => {
  document.getElementById('stats').textContent = 'Помилка завантаження: ' + err.message;
});
</script>
</body>
</html>
